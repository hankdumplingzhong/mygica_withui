<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyGICA · TOML 编辑</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script>window.require={paths:{'vs':'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs'}};</script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.min.js"></script>
  <script src="/static/editor.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="left">
      <strong>MyGICA UI</strong>
      <span class="hint"> · <a href="/" style="color:#9ca3af">主页</a></span>
      <span id="rootHint" class="hint"></span>
    </div>
    <div class="right">
      <select id="fileSelect"></select>
      <button id="btnLoad">加载</button>
      <button id="btnSave">保存</button>
      <button id="btnValidate">校验</button>
      <button id="btnBuild">全量构建</button>
    </div>
  </header>
  <!-- 下面内容保持与当前 index.html 相同 -->
  <main class="grid2">
    <section class="pane"><div id="editor" class="editor"></div></section>
    <section class="pane">
      <div class="tabs">
        <button class="tab active" data-tab="ranges">Ranges</button>
        <button class="tab" data-tab="project">Project</button>
        <button class="tab" data-tab="sources">Sources</button>
        <button class="tab" data-tab="colors">Colors</button>
      </div>
      <div class="tabpanes">
        <div id="tab-ranges" class="tabpane active"><div id="rangesList" class="list"></div><canvas id="timeline" height="90"></canvas></div>
        <div id="tab-project" class="tabpane"><pre id="projectView" class="kv"></pre></div>
        <div id="tab-sources" class="tabpane"><pre id="sourcesView" class="kv"></pre></div>
        <div id="tab-colors" class="tabpane"><pre id="colorsView" class="kv"></pre></div>
      </div>
      <div class="console" id="console"></div>
      <div class="outputs"><h3>最近输出</h3><div id="outputsList" class="cards"></div></div>
    </section>
  </main>
</body>
</html>
