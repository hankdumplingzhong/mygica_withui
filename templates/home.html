<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyGICA · 控制台</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="left"><strong>MyGICA 控制台</strong></div>
    <div class="right">
      <select id="nav">
        <option value="">快速跳转…</option>
        <option value="/editor">TOML 编辑 / 构建</option>
        <option value="/visedit">可视化选段 → TOML</option>
      </select>
    </div>
  </header>
  <main class="grid2">
    <section class="pane">
      <h1>欢迎 (爱音下方有使用说明)</h1>
      <div class="welcome-hero">
        <img
          src="/static/images/big_anon3.png"
          alt="Ave MyGICA 欢迎页横幅"
          loading="lazy"
          class="welcome-hero-img"
        />
      </div>
      <p>欢迎来到Ave MyGICA的世界。右上角下拉可进入：</p>
      <ul>
        <li><strong>TOML 编辑 / 构建</strong>：(已有TOML文件的情况下)编辑并编译TOML文件。</li>
        <li><strong>视频手动截取 → TOML</strong>：录入本地素材地址，输入片段起止（帧或时间码），一键生成 <code>[[ranges]]</code> 片段。</li>
      </ul>
    </section>
    <section class="pane">
      <h3>最近输出</h3>
      <div id="outputsList" class="cards"></div>
    </section>
  </main>
  <script>
    // 复用现有 /outputs 接口列出卡片
    const $ = s => document.querySelector(s);
    const fmtBytes = n => { if (n < 1024) return n + " B"; const u=['KB','MB','GB']; let i=-1; do{n/=1024;i++;}while(n>=1024&&i<u.length-1); return n.toFixed(1)+' '+u[i]; };
    const ts = x => new Date(x*1000).toLocaleString();
    async function api(p,o){ const r=await fetch(p,o); if(!r.ok) throw new Error(await r.text()); return r.json(); }
    async function outputsList(){
      const list = await api('/outputs');
      const box = $('#outputsList'); box.innerHTML = '';
      list.forEach(it => {
        const card = document.createElement('div'); card.className = 'card';
        card.innerHTML = `<div class="meta">
            <div><strong>${it.name}</strong></div>
            <div>${ts(it.mtime)} · ${fmtBytes(it.size)}</div>
          </div>
          <video controls preload="metadata" src="/outputs/${encodeURIComponent(it.name)}"></video>`;
        box.appendChild(card);
      });
    }
    document.addEventListener('DOMContentLoaded', ()=>{
      outputsList();
      $('#nav').addEventListener('change', e => { if(e.target.value) location.href = e.target.value; });
    });
  </script>
</body>
</html>
